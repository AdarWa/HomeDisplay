syntax = "proto3";

package ui;

enum WidgetType {
  OBJ = 0;
  SCREEN = 1;
  BUTTON = 2;
  LABEL = 3;
  SLIDER = 4;
  CHECKBOX = 5;
  IMAGE = 6;
}

enum AlignType {
  DEFAULT = 0;
  CENTER = 1;
  TOP_LEFT = 2;
  BOTTOM_RIGHT = 3;
}

enum EventType {
  CLICKED = 0;
  LONG_PRESSED = 1;
  VALUE_CHANGED = 2;
  FOCUSED = 3;
}

enum Side {
  SIDE_ALL = 0;
  SIDE_TOP = 1;
  SIDE_BOTTOM = 2;
  SIDE_LEFT = 3;
  SIDE_RIGHT = 4;
}

message Padding {
  Side side = 1;
  int32 pad = 2;
}

message Margin {
  Side side = 1;
  int32 margin = 2;
}

message Style {
  uint32 text_color = 1;
  uint32 bg_color = 2;
  uint32 border_color = 3;
  int32 border_width = 4;
  int32 radius = 5;

  repeated Padding paddings = 6;
  repeated Margin margins = 7;
}

message EventHandler {
  EventType trigger = 1;
  string action_id = 2; // for defined actions
}

// Widget specific state data
message WidgetData {
  int32 slider_min = 1;
  int32 slider_max = 2;
  int32 slider_val = 3;
  bool is_checked = 4; // checkboxes
}

message LvObject {
  WidgetType type = 1;
  string id = 2;

  int32 x = 3;
  int32 y = 4;
  int32 width = 5;
  int32 height = 6;
  AlignType align = 7;

  string text = 8;

  Style style = 9;
  WidgetData data = 10;
  repeated EventHandler events = 11;

  repeated LvObject children = 12;
}